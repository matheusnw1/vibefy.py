<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="stylesheet" href="/static/style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibefy</title>
</head>
<body>
<body>
  <div class="header">
    <div class="titulo">VIBEFY</div>

    <h1>let the <em>music</em><br>find you.</h1>
    <p class="subtitulo">Descreva seu momento. A IA encontra a trilha perfeita.</p>

    <div class="form">
      <div class="label">COMO VOCÊ ESTÁ SE SENTINDO?</div>
      <input type="text" id="humor" placeholder="Ex: cansado mas querendo relaxar sem dormir...">

      <div class="label">MÚSICAS QUE VOCÊ GOSTA (OPCIONAL — ATÉ 3)</div>
      <div class="musicas">
        <input type="text" id="t1" placeholder="Música 1">
        <input type="text" id="t2" placeholder="Música 2">
        <input type="text" id="t3" placeholder="Música 3">
      </div>

      <button id="btn-buscar" onclick="buscar()">Encontrar minha música →</button>
    </div>

    <div class="resultado" id="resultado">
      <img src="" alt="" id="capa">
      <p id="nome"></p>
      <audio src="" id="audio" controls></audio>
    </div>
  </div>
  <script>

    function buscar() {
      let humor = document.getElementById('humor').value

      let musica1 = document.getElementById('t1').value
      let musica2 = document.getElementById('t2').value
      let musica3 = document.getElementById('t3').value

      let gostos = [musica1, musica2, musica3].filter(m => m !== '')

      fetch('/buscar', {
        method:'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({humor: humor, gostos: gostos})
      })
      .then(res => res.json())
      .then(data => { 
          document.getElementById('capa').src = data.capa
          document.getElementById('nome').textContent = data.nome
          document.getElementById('audio').src = data.preview
    })
    }
  </script>
</body>
</html>
